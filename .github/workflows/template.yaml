name: Test Local Model Deployment

on:
  workflow_dispatch:
    inputs:
      model_url:
        description: 'GGUF model URL to download'
        required: true
        default: 'https://huggingface.co/unsloth/Qwen3.5-0.8B-GGUF/resolve/main/Qwen3.5-0.8B-Q4_K_M.gguf'
      test_message:
        description: 'Test message to send to the model'
        required: true
        default: 'Hello, please introduce yourself briefly.'

jobs:
  test-deployment:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          wget \
          curl
    
    - name: Download model
      run: |
        echo "📥 Downloading model from: ${{ github.event.inputs.model_url }}"
        cd server/models
        wget -O model.model "${{ github.event.inputs.model_url }}"
        echo "✅ Model downloaded: $(ls -lh model.model)"
    
    - name: Install Python dependencies
      run: |
        cd server
        pip install -r requirements.txt
    
    - name: Update test message in script
      run: |
        # Replace the default test message with the one from workflow input
        sed -i "s/test_message = \".*\"/test_message = \"${{ github.event.inputs.test_message }}\"/" test_deployment.py
    
    - name: Run deployment test
      run: |
      cd server
        python test_deployment.py
      continue-on-error: false
    
    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: server/sessions/
        retention-days: 7
    
    - name: Create deployment summary
      if: always()
      run: |
        echo "## 📊 Deployment Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Model Download | ✅ |" >> $GITHUB_STEP_SUMMARY
        echo "| Server Startup | ✅ |" >> $GITHUB_STEP_SUMMARY
        echo "| Model Inference | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📝 Test Message" >> $GITHUB_STEP_SUMMARY
        echo "> \"${{ github.event.inputs.test_message }}\"" >> $GITHUB_STEP_SUMMARY