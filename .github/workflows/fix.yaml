name: Organize Files into Server Structure

on:
  workflow_dispatch:  # Manual trigger only
    inputs:
      commit_message:
        description: 'Commit message'
        required: true
        default: 'Organize files into server directory structure'

jobs:
  organize-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push changes
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for proper commit
    
    - name: Display current structure
      run: |
        echo "📁 Current repository structure:"
        ls -la
        echo ""
        echo "📁 Full tree (if tree command available):"
        tree -L 2 || find . -maxdepth 2 -type f | sort
    
    - name: Create server directory and subdirectories
      run: |
        echo "🔨 Creating server directory structure..."
        mkdir -p server/{models,sessions,static,templates}
        echo "✅ Created: server/models/, server/sessions/, server/static/, server/templates/"
    
    - name: Move Python files to server folder
      run: |
        echo "📦 Moving Python files..."
        # Move all .py files from root to server/
        for file in *.py; do
          if [ -f "$file" ]; then
            mv "$file" "server/$file"
            echo "  Moved: $file → server/$file"
          fi
        done
    
    - name: Move template files
      run: |
        echo "📦 Moving template files..."
        # Move HTML files to templates/
        for file in *.html; do
          if [ -f "$file" ]; then
            mv "$file" "server/templates/$file"
            echo "  Moved: $file → server/templates/$file"
          fi
        done
        
        # Also check for templates folder existing
        if [ -d "templates" ] && [ "$(ls -A templates)" ]; then
          cp -r templates/* server/templates/ 2>/dev/null || :
          rm -rf templates
          echo "  Moved: templates/ contents → server/templates/"
        fi
    
    - name: Move static files
      run: |
        echo "📦 Moving static files..."
        # Move CSS/JS files to static/
        for file in *.css *.js; do
          if [ -f "$file" ]; then
            mv "$file" "server/static/$file"
            echo "  Moved: $file → server/static/$file"
          fi
        done
        
        # Also check for static folder existing
        if [ -d "static" ] && [ "$(ls -A static)" ]; then
          cp -r static/* server/static/ 2>/dev/null || :
          rm -rf static
          echo "  Moved: static/ contents → server/static/"
        fi
    
    - name: Move requirements file
      run: |
        if [ -f "requirements.txt" ]; then
          mv requirements.txt server/requirements.txt
          echo "✅ Moved: requirements.txt → server/requirements.txt"
        fi
    
    - name: Handle model file if exists
      run: |
        if [ -f "model.model" ]; then
          mv model.model server/models/model.model
          echo "✅ Moved: model.model → server/models/model.model"
        elif [ -f "*.gguf" ]; then
          # Move any .gguf file to model.model
          gguf_file=$(ls *.gguf 2>/dev/null | head -n 1)
          if [ -n "$gguf_file" ]; then
            mv "$gguf_file" server/models/model.model
            echo "✅ Moved: $gguf_file → server/models/model.model"
          fi
        fi
    
    
    - name: Clean up any remaining files
      run: |
        echo "🧹 Cleaning up old directories..."
        # Remove empty directories that might be left
        rm -rf __pycache__ 2>/dev/null || :
        rm -rf .pytest_cache 2>/dev/null || :
        
        # List what's left in root
        echo ""
        echo "📁 Remaining files in root:"
        ls -la
    
    - name: Verify final structure
      run: |
        echo "✅ Final server directory structure:"
        echo ""
        echo "server/:"
        ls -la server/
        echo ""
        echo "server/models/:"
        ls -la server/models/ || echo "  (empty)"
        echo ""
        echo "server/templates/:"
        ls -la server/templates/ || echo "  (empty)"
        echo ""
        echo "server/static/:"
        ls -la server/static/ || echo "  (empty)"
        echo ""
        echo "server/sessions/:"
        ls -la server/sessions/ || echo "  (empty)"
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add all changes
        git add .
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit"
        else
          git commit -m "${{ github.event.inputs.commit_message }}"
          git push
          echo "✅ Changes pushed successfully"
        fi
    
    - name: Create summary
      run: |
        echo "## 📁 File Organization Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### New Structure:" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "server/" >> $GITHUB_STEP_SUMMARY
        echo "├── app.py" >> $GITHUB_STEP_SUMMARY
        echo "├── model_loader.py" >> $GITHUB_STEP_SUMMARY
        echo "├── session_manager.py" >> $GITHUB_STEP_SUMMARY
        echo "├── summarizer.py" >> $GITHUB_STEP_SUMMARY
        echo "├── requirements.txt" >> $GITHUB_STEP_SUMMARY
        echo "├── models/" >> $GITHUB_STEP_SUMMARY
        echo "│   ├── model.model (if existed)" >> $GITHUB_STEP_SUMMARY
        echo "│   └── memory.md" >> $GITHUB_STEP_SUMMARY
        echo "├── templates/" >> $GITHUB_STEP_SUMMARY
        echo "│   └── index.html" >> $GITHUB_STEP_SUMMARY
        echo "├── static/" >> $GITHUB_STEP_SUMMARY
        echo "│   ├── style.css" >> $GITHUB_STEP_SUMMARY
        echo "│   └── script.js" >> $GITHUB_STEP_SUMMARY
        echo "└── sessions/" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📝 Next Steps:" >> $GITHUB_STEP_SUMMARY
        echo "1. Download a model and save it as \`server/models/model.model\`" >> $GITHUB_STEP_SUMMARY
        echo "2. Run the test deployment workflow" >> $GITHUB_STEP_SUMMARY
        echo "3. Use ngrok to expose it publicly" >> $GITHUB_STEP_SUMMARY