name: Build new

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  organize-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push changes

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for proper commit

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
        build-essential \
        cmake \
        wget \
        curl \
        git \
        lsof \
        libcurl4-openssl-dev \
        libssl-dev \
        python3-dev \
        libgomp1 \
        libatomic1 \
        libstdc++6

    - name: Setup ngrok
      run: |
        # Download and install ngrok
        wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        sudo tar xvzf ngrok-v3-stable-linux-amd64.tgz -C /usr/local/bin
        rm ngrok-v3-stable-linux-amd64.tgz
        
        # Configure ngrok with token from GitHub secrets
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        # Start ngrok in background (will be killed when job ends)
        ngrok http 5000 --log=stdout > ngrok.log 2>&1 &
        
        # Give ngrok time to start
        sleep 3
        
        # Get the public URL
        NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])")
        echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV
        
        echo "=================================================="
        echo "✅ NGROK TUNNEL ESTABLISHED"
        echo "🌐 Public URL: $NGROK_URL"
        echo "=================================================="

    - name: Bingo
      run: |
        echo "lets go"
        echo "📡 Ngrok tunnel is active at: ${{ env.NGROK_URL }}"
        echo ""
        cd server/new
        pip install -r requirements.txt
        mkdir -p models
        cd models
        
        # Download model if it doesn't exist
        if [ ! -f qwen3.gguf ]; then
          echo "📥 Downloading Qwen model..."
          wget -O qwen3.gguf "https://huggingface.co/bartowski/Qwen_Qwen3.5-0.8B-GGUF/resolve/main/Qwen_Qwen3.5-0.8B-Q4_K_M.gguf"
        else
          echo "✅ Model already exists, skipping download"
        fi
        
        cd ..
        
        echo ""
        echo "🚀 Starting LLM Server..."
        echo "📡 Access via Ngrok: ${{ env.NGROK_URL }}"
        echo ""
        
        # Run the server
        echo " "
        ls -la
        echo " "
        python server.py

    - name: Keep alive and monitor
      if: always()
      run: |
        echo "📊 Server Status Monitor"
        echo "========================"
        echo "🌐 Ngrok URL: ${{ env.NGROK_URL }}"
        echo "📡 Local URL: http://localhost:5000"
        echo ""
        echo "🔄 Monitoring server (press Ctrl+C to stop)..."
        
        # Monitor ngrok logs and keep workflow running
        while true; do
          sleep 60
          echo "[$(date)] Server still running..."
          # Check if ngrok is still alive
          curl -s http://localhost:4040/api/tunnels > /dev/null || {
            echo "⚠️ Ngrok tunnel lost! Attempting to restart..."
            ngrok http 5000 --log=stdout > ngrok.log 2>&1 &
          }
        done