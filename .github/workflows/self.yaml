name: Self Hosted

on:
  workflow_dispatch:

jobs:
  serve:
    runs-on: self-hosted
    timeout-minutes: 350

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          build-essential \
          cmake \
          wget \
          curl \
          lsof \
          libcurl4-openssl-dev \
          libssl-dev \
          python3-dev \
          python3-pip \
          python3-venv \
          python3-full \
          libgomp1 \
          libatomic1

    - name: Create or reuse virtualenv
      run: |
        # Venv lives outside the repo so it survives between runs.
        # Change the path if you prefer somewhere else on your machine.
        VENV="$HOME/.haven-venv"

        if [ ! -d "$VENV" ]; then
          echo "Creating virtualenv at $VENV..."
          python3 -m venv "$VENV"
        else
          echo "Reusing existing virtualenv at $VENV"
        fi

        # Write the activation path to GITHUB_ENV so every later step
        # can just use `python` and `pip` without re-activating.
        echo "VENV=$VENV" >> $GITHUB_ENV
        echo "PATH=$VENV/bin:$PATH" >> $GITHUB_ENV

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip --quiet

        pip install \
          fastapi \
          "uvicorn[standard]" \
          jinja2 \
          python-multipart \
          httpx \
          aiofiles \
          --quiet

        # Only reinstall llama-cpp-python if it isn't already present.
        # Building from source takes a few minutes — skip when possible.
        if ! python -c "import llama_cpp" 2>/dev/null; then
          echo "Installing llama-cpp-python (building from source)..."
          pip install llama-cpp-python==0.2.26 --no-cache-dir
        else
          echo "llama-cpp-python already installed — skipping"
        fi

        echo "✅ Python dependencies ready"

    - name: Download model
      run: |
        mkdir -p server/models
        cd server/models

        # Skip download if the model file is already there.
        # On a self-hosted runner the workspace often persists between runs.
        if [ -f model.gguf ]; then
          SIZE=$(du -h model.gguf | cut -f1)
          echo "✅ model.gguf already present — $SIZE, skipping download"
        else
          # ── Pick ONE model and uncomment it ──────────────────────────
          #
          # Option A: TinyLlama 1.1B Q4 (~660 MB) — fastest, lowest RAM
          #echo "📥 Downloading TinyLlama 1.1B..."
          #wget -q --show-progress \
            #-O model.gguf \
            #"https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf"
          #
          # Option B: Mistral 7B Q4 (~4 GB) — better quality, needs more RAM
           wget -q --show-progress \
             -O model.gguf \
             "https://huggingface.co/TheBloke/Mistral-7B-Instruct-v0.2-GGUF/resolve/main/mistral-7b-instruct-v0.2.Q4_0.gguf"
          #
          # Option C: Biggie (the biggest
          #echo "📥 Downloading Quantized chatgpt-20b-q4"
          #wget -q --show-progress \
            #-O model.gguf \
            #"https://huggingface.co/unsloth/gpt-oss-safeguard-20b-GGUF/resolve/main/gpt-oss-safeguard-20b-Q4_0.gguf"
          #
          # ─────────────────────────────────────────────────────────────

          if [ -f model.gguf ]; then
            SIZE=$(du -h model.gguf | cut -f1)
            echo "✅ model.gguf downloaded — $SIZE"
          else
            echo "❌ Download failed — model.gguf not found"
            exit 1
          fi
        fi

    - name: Setup ngrok
      run: |
        # Install ngrok only if missing
        if ! command -v ngrok &>/dev/null; then
          echo "Installing ngrok..."
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          sudo tar xzf ngrok-v3-stable-linux-amd64.tgz -C /usr/local/bin
          rm ngrok-v3-stable-linux-amd64.tgz
        else
          echo "ngrok already installed — skipping"
        fi

        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

        # Kill any leftover ngrok from a previous run
        pkill ngrok 2>/dev/null || true
        sleep 1

        ngrok http 8000 --log=stdout > /tmp/ngrok.log 2>&1 &
        sleep 5

        NGROK_URL=$(curl -s http://localhost:4040/api/tunnels \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])")

        echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV

        echo "================================================"
        echo "✅ NGROK TUNNEL ESTABLISHED"
        echo "🌐 Public URL: $NGROK_URL"
        echo "================================================"

    - name: Start Haven server
      run: |
        cd server

        export HAVEN_MODEL_PATH="models/model.gguf"
        export HAVEN_MEMORY_PATH="models/memory.md"
        export OMP_NUM_THREADS=2

        # Kill any server leftover from a previous run on this port
        fuser -k 8000/tcp 2>/dev/null || true
        sleep 1

        echo "🚀 Starting Haven..."
        echo "📡 Access via: ${{ env.NGROK_URL }}"
        echo ""

        "$VENV/bin/python" -m uvicorn app:app \
          --host 0.0.0.0 \
          --port 8000 \
          --log-level info \
          --workers 1 &

        SERVER_PID=$!

        echo "Waiting for server to come up..."
        for i in $(seq 1 30); do
          if curl -s http://localhost:8000 > /dev/null 2>&1; then
            echo "✅ Server is up (attempt $i)"
            break
          fi
          echo "  ⏳ attempt $i/30..."
          sleep 2
        done

        echo ""
        echo "================================================"
        echo "🌐 Haven is live at: ${{ env.NGROK_URL }}"
        echo "================================================"
        echo ""

        while true; do
          sleep 60
          echo "[$(date '+%H:%M:%S')] Running — ${{ env.NGROK_URL }}"

          if ! curl -s http://localhost:4040/api/tunnels > /dev/null 2>&1; then
            echo "⚠️  ngrok tunnel lost — restarting..."
            pkill ngrok 2>/dev/null || true
            sleep 1
            ngrok http 8000 --log=stdout > /tmp/ngrok.log 2>&1 &
            sleep 5
            NEW_URL=$(curl -s http://localhost:4040/api/tunnels \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null || echo "unknown")
            echo "🔄 New URL: $NEW_URL"
          fi

          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "⚠️  Server process died — restarting..."
            HAVEN_MODEL_PATH="models/model.gguf" \
            HAVEN_MEMORY_PATH="models/memory.md" \
            OMP_NUM_THREADS=2 \
            "$VENV/bin/python" -m uvicorn app:app \
              --host 0.0.0.0 \
              --port 8000 \
              --workers 1 &
            SERVER_PID=$!
            echo "🔄 Server restarted (PID $SERVER_PID)"
          fi
        done
