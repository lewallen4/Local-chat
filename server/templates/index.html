<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Chat — LLM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-shell">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <div class="brand-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="brand-name">Local Chat</span>
                    <span class="brand-tag">LOCAL</span>
                </div>
                <button id="new-chat" class="btn-new-chat" title="New session (Ctrl+N)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    New Session
                </button>
            </div>

            <!-- Session list (main body of sidebar) -->
            <div class="sidebar-section">
                <div class="section-label">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Sessions
                </div>
                <div id="session-list" class="session-list">
                    <div class="session-empty">No sessions yet</div>
                </div>
            </div>

            <!-- Memory bank — collapsible, at the bottom -->
            <div class="memory-panel" id="memory-panel">
                <button class="memory-toggle" id="memory-toggle" title="Toggle memory bank">
                    <div class="memory-toggle-left">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                            <path d="M12 8v4l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span>Memory Bank</span>
                    </div>
                    <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none">
                        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="memory-body" id="memory-body">
                    <div id="memory-preview" class="memory-preview">
                        <div class="memory-loading"><span class="pulse-dot"></span> Loading...</div>
                    </div>
                </div>
            </div>

            <!-- Status footer -->
            <div class="sidebar-footer">
                <div class="status-row">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-label">Connecting...</span>
                </div>
                <div class="meta-row"><span id="session-id-display" class="mono-text">—</span></div>
                <div class="meta-row"><span id="message-count" class="mono-text">0 exchanges</span></div>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="main-chat">
            <div class="chat-header">
                <button class="icon-btn" id="sidebar-toggle" title="Toggle sidebar (Ctrl+B)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <div class="chat-title" id="chat-title">New Session</div>
                <div class="header-actions">
                    <div class="model-badge">
                        <span class="model-dot"></span>
                        <span id="model-name">llama.cpp</span>
                    </div>
                    <button class="icon-btn" id="theme-toggle" title="Switch to light mode">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
                            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="chat-messages" class="chat-messages">
                <div class="welcome-screen">
                    <div class="welcome-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h2>Local Chat is ready.</h2>
                    <p>Your fully local AI assistant. No cloud, no telemetry, no traces.</p>
                    <div class="welcome-hints">
                        <span class="hint">↵ Send</span>
                        <span class="hint">⇧ ↵ New line</span>
                        <span class="hint">Esc Clear</span>
                    </div>
                </div>
            </div>

            <div class="input-zone">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Message Local Chat..." rows="1" disabled></textarea>
                    <button id="send-button" disabled title="Send message">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button id="stop-button" class="stop-btn hidden" title="Stop generation">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
                <div class="input-meta">
                    <span id="typing-indicator" class="typing-indicator hidden">
                        <span class="typing-dots"><span></span><span></span><span></span></span>
                        Generating...
                    </span>
                    <span class="input-hint">Local inference — all data stays on your machine</span>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
